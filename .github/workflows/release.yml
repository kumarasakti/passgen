name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        default: 'v1.2.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Cache Go modules (restore only)
      uses: actions/cache/restore@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Cache build artifacts (restore only)
      uses: actions/cache/restore@v4
      with:
        path: build/
        key: ${{ runner.os }}-build-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-build-
    
    - name: Install dependencies
      run: go mod download
    
    - name: Run tests
      run: go test -v ./...
    
    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Build for all platforms
      run: |
        echo "🔍 Verifying CGO_ENABLED setting for release builds:"
        echo "CGO_ENABLED=$CGO_ENABLED"
        make build-all VERSION=${{ steps.version.outputs.VERSION }}
      env:
        CGO_ENABLED: 0
    
    - name: Create release archives
      run: make release VERSION=${{ steps.version.outputs.VERSION }}
    
    - name: Test release binaries
      run: |
        # Test a few key binaries to ensure they work
        ./dist/passgen-linux-amd64 --version
        ./dist/passgen-linux-amd64 word "test" --strategy hybrid
        ./dist/passgen-darwin-amd64 --version || echo "macOS binary test skipped on Linux"
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: ${{ steps.version.outputs.VERSION }}
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## What's New in ${{ steps.version.outputs.VERSION }}
          
          🔒 **Improved Password Generation Security** - More control and better defaults!
          
          ### New Features:
          - `--no-repeat` flag — Generate passwords with no duplicate characters
          - Guaranteed character-type coverage when using `--no-repeat`
          - Cryptographically secure Fisher-Yates shuffle for no-repeat mode
          - Batch uniqueness — `GenerateMultiplePasswords` guarantees unique results
          
          ### Improvements:
          - Default generation maximizes entropy (with-replacement sampling)
          - `BuildCategories` method for per-category charset construction
          - Slant ASCII banner on `--version` and `--help`
          - Tidied README with updated docs and examples
          
          ### Download:
          Choose the appropriate binary for your platform from the assets below.
          
        files: |
          dist/releases/*
        token: ${{ secrets.GITHUB_TOKEN }} 